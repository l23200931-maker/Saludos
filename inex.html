<!DOCTYPE html>
<html lang="es">
<head>
 <meta charset="UTF-8">
 <title>Ejemplo de JavaScript</title>
</head>
<body>
 <h2>Ejemplo: Variables y Funciones</h2>
 <button onclick="mostrarSaludo()">Saludar</button>
 <script>
 // Declaración de variables y constantes
 let nombre = "ALEX";
 const pais = "México";
 // Función
 function mostrarSaludo() {
 let mensaje = "Hola " + nombre + " desde " + pais + "!";
 alert(mensaje);
 }
 </script>
</body>
</html>
